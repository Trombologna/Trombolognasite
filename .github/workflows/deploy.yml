name: Deploy Astro site to GitHub Pages
on:
  push:
    branches: [ main ]          # rebuild every commit to main
  workflow_dispatch:            # allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write               # needed by deploy-pages action

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out source
      - uses: actions/checkout@v4

      # 2. Set up Node
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Install & build Astro
      - run: npm ci
      - run: npm run build       # output goes to ./dist by default

      # 4. Upload the static site as a Pages artifact
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 5. Deploy the artifact to GitHub Pages
      - id: deployment
        uses: actions/deploy-pages@v4
